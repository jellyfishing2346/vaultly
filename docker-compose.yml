services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vaultly
      POSTGRES_PASSWORD: vaultly_dev
      POSTGRES_DB: vaultly
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_ledger.sql:/docker-entrypoint-initdb.d/001_ledger.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultly"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://vaultly:vaultly_dev@postgres:5432/vaultly
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
